<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA - Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-admin { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-admin shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="#"><i class="bi bi-shield-lock-fill"></i> SIGEA AdminCenter</a>
            <div class="d-flex">
                <span class="navbar-text text-white me-3">
                    <i class="bi bi-person-circle"></i> Administrador
                </span>
                <button class="btn btn-light btn-sm text-primary fw-bold" id="btnAdminLogout">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <h1 class="fw-bold">Centro de Comando</h1>
                <p class="text-muted">Gestión total de Alumnos, Materias y Finanzas.</p>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12 text-center mt-5">
                <div class="spinner-grow text-primary" role="status"></div>
                <h4 class="mt-3 text-secondary">Preparando módulos de administración...</h4>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
